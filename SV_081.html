<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>AI Evolution 3D: Genetics & Archery</title>
    <style>
        body { margin: 0; overflow: hidden; background-color: #000; font-family: 'Segoe UI', sans-serif; user-select: none; }
        #ui-layer { position: absolute; top: 10px; left: 10px; color: #fff; pointer-events: none; z-index: 100; text-shadow: 1px 1px 2px #000; }
        .panel { background: rgba(0, 15, 0, 0.7); border: 1px solid #00ff41; padding: 10px; border-radius: 8px; margin-bottom: 10px; pointer-events: auto; }
        
        .bot-label, .animal-label { position: absolute; background: rgba(0, 0, 0, 0.8); border: 1px solid #555; color: #fff; padding: 6px; border-radius: 6px; font-size: 11px; text-align: left; pointer-events: none; transform: translate(-50%, -100%); white-space: nowrap; box-shadow: 0 0 8px rgba(0,0,0,0.5); display: none; transition: border-color 0.3s; z-index: 10; }
        .animal-label { background: rgba(20, 10, 0, 0.6); border-color: #aa5500; font-size: 10px; padding: 3px 5px; }
        
        .desperate-mode { color: #ff3333; font-weight: bold; animation: blink 0.5s infinite; }
        .crazy-mode { color: #ff3333; font-weight: bold; font-size: 9px; animation: blink 0.4s infinite; }
        .alert-mode { color: #ffaa00; font-weight: bold; font-size: 10px; animation: blink 0.3s infinite; }
        .buff-mode { color: #00ffff; font-weight: bold; font-size: 10px; animation: blink 0.6s infinite; }
        .exhausted-text { color: #aaaaaa; font-style: italic; font-weight: bold; font-size: 10px; }
        @keyframes blink { 0% { opacity: 1; } 50% { opacity: 0.5; } 100% { opacity: 1; } }

        #inventory-panel { position: absolute; top: 10px; right: 10px; width: 230px; display: none; color: #fff; background: rgba(0, 25, 0, 0.85); box-shadow: 0 0 10px rgba(0,255,65,0.2); text-shadow: 1px 1px 2px #000;}
        .inv-item { display: flex; justify-content: space-between; border-bottom: 1px dashed #555; padding: 4px 0; font-size: 13px; color: #ddd; font-weight: 500;}
        .inv-weapon { color: #ffeb3b; font-weight: bold; margin-bottom: 5px; text-align: center; font-size: 13px; }
        .inv-armor { color: #00e5ff; font-weight: bold; margin-bottom: 5px; text-align: center; font-size: 11px; }

        .stat-row { display: flex; align-items: center; margin-top: 3px; }
        .stat-icon { width: 14px; text-align: center; margin-right: 4px; font-size: 10px; }
        .bar-container { flex-grow: 1; height: 5px; background: #333; border-radius: 2px; overflow: hidden; position: relative; width: 60px;}
        .bar-fill { height: 100%; transition: width 0.2s; }
        .hp-fill { background: #ff3333; } .food-fill { background: #ffaa00; } .water-fill { background: #00ccff; } .sleep-fill { background: #aa00ff; } .stam-fill { background: #ffff00; }
        
        .cam-btn { background: #222; color: #fff; border: 1px solid #555; padding: 5px 10px; cursor: pointer; border-radius: 4px; margin-right: 5px; font-size: 11px; transition: 0.2s; }
        .cam-btn:hover { background: #444; } .cam-btn.active { background: #00ff41; color: #000; font-weight: bold; border-color: #00ff41; }
        .building-label { position: absolute; background: rgba(139, 69, 19, 0.8); border: 1px solid #ffaa00; color: #fff; padding: 3px 6px; border-radius: 4px; font-size: 10px; pointer-events: none; transform: translate(-50%, -50%); display: none; text-align: center; font-weight: bold; z-index: 5;}
    </style>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
</head>
<body>
    <div id="ui-layer">
        <div class="panel">
            <h3 style="margin:0 0 5px 0; color:#00ff41;">🧬 AI EVOLUTION v77.0 (Escape Dynamics & Fast Loot)</h3>
            <div id="time-display" style="font-size: 14px; font-weight: bold;">Ngày 1 - 08:00 (Mùa Xuân)</div>
            <div id="weather-display" style="color:#ffaa00; font-size: 11px;">Fix Kẹt Núi | Cân Bằng Dụng Cụ | Gom Đồ Đỉnh Cao</div>
        </div>
        <div class="panel" style="display: flex; gap: 5px;">
            <button class="cam-btn active" onclick="setCamera('free')">🎥 Tự do</button>
            <button class="cam-btn" onclick="setCamera('b1')" style="border-bottom: 2px solid #ff0055;">🔴 Alpha</button>
            <button class="cam-btn" onclick="setCamera('b2')" style="border-bottom: 2px solid #0088ff;">🔵 Beta</button>
            <button class="cam-btn" onclick="setCamera('b3')" style="border-bottom: 2px solid #22aa22;">🟢 Gamma</button>
        </div>
    </div>
    
    <div id="inventory-panel" class="panel">
        <h4 id="inv-bot-name" style="margin: 0 0 5px 0; color: #00ff41; text-align: center;">🎒 TÚI ĐỒ</h4>
        <div id="inv-weapon-slot" class="inv-weapon">⚔️ Vũ khí: Tay không</div>
        <div id="inv-armor-slot" class="inv-armor">🛡️ Giáp: Không có</div>
        <div class="inv-item"><span>🌲 Gỗ:</span> <span id="inv-wood">0</span></div>
        <div class="inv-item"><span>🪨 Đá:</span> <span id="inv-stone">0</span></div>
        <div class="inv-item"><span>⛏️ Quặng:</span> <span id="inv-ore">0</span></div>
        <div class="inv-item"><span>🍖 Thịt:</span> <span id="inv-meat">0</span></div>
        <div class="inv-item"><span>🍇 Thực vật:</span> <span id="inv-food">0</span></div>
        <div class="inv-item"><span>🧥 Lông thú:</span> <span id="inv-fur">0</span></div>
    </div>

    <div id="labels-container"></div>

    <script>
        // ==========================================
        // 1. THIẾT LẬP THẾ GIỚI
        // ==========================================
        const MAP_SIZE = 25000; const MAP_LIMIT = 12000;
        const waterZones = []; const mountains = []; 
        const projectiles = []; 
        const botMemories = {};

        const scene = new THREE.Scene(); scene.fog = new THREE.FogExp2(0x87CEEB, 0.0002);
        const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 10, 60000);
        camera.position.set(0, 800, 1200);

        const renderer = new THREE.WebGLRenderer({ antialias: false }); renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.shadowMap.enabled = true; renderer.shadowMap.type = THREE.PCFSoftShadowMap;
        document.body.appendChild(renderer.domElement);

        const controls = new THREE.OrbitControls(camera, renderer.domElement);
        controls.maxPolarAngle = Math.PI / 2 - 0.05; controls.maxDistance = 10000;
        controls.enableDamping = true; controls.dampingFactor = 0.05;

        const keys = { KeyW: false, KeyA: false, KeyS: false, KeyD: false };
        window.addEventListener('keydown', e => { if(keys.hasOwnProperty(e.code)) keys[e.code] = true; });
        window.addEventListener('keyup', e => { if(keys.hasOwnProperty(e.code)) keys[e.code] = false; });

        let globalTime = 8; let daysPassed = 1; const SEASONS = ['Xuân', 'Hạ', 'Thu', 'Đông']; let currentSeason = 0;
        let targetBotId = 'free'; window.rockSpawnedThisCycle = false; window.oreSpawnedThisCycle = false;

        const ambientLight = new THREE.AmbientLight(0xffffff, 0.4); scene.add(ambientLight);
        const sunLight = new THREE.DirectionalLight(0xffffff, 1.0); sunLight.castShadow = true;
        sunLight.shadow.camera.left = -3000; sunLight.shadow.camera.right = 3000; sunLight.shadow.camera.top = 3000; sunLight.shadow.camera.bottom = -3000;
        scene.add(sunLight);

        const ground = new THREE.Mesh(new THREE.PlaneGeometry(MAP_SIZE, MAP_SIZE), new THREE.MeshStandardMaterial({ color: 0x3a5f2e, roughness: 0.9 }));
        ground.rotation.x = -Math.PI / 2; ground.receiveShadow = true; scene.add(ground);

        const waterMat = new THREE.MeshStandardMaterial({ color: 0x1ca3ec, transparent: true, opacity: 0.8 });
        
        let tempWaterZones = [];
        function createWindingRiver(points, width) {
            const curve = new THREE.CatmullRomCurve3(points);
            const river = new THREE.Mesh(new THREE.TubeGeometry(curve, 100, width, 8, false).scale(1,0.05,1), waterMat);
            river.position.y = 2; scene.add(river); 
            curve.getPoints(100).forEach(p => tempWaterZones.push({x: p.x, z: p.z, r: width}));
        }
        createWindingRiver([new THREE.Vector3(-10000, 0, 5000), new THREE.Vector3(0, 0, 0), new THREE.Vector3(8000, 0, -8000)], 250);
        for(let i=0; i<20; i++) { 
            let x = (Math.random()-0.5)*MAP_SIZE; let z = (Math.random()-0.5)*MAP_SIZE; let r = Math.random()*200+100;
            scene.add(new THREE.Mesh(new THREE.CylinderGeometry(r, r, 5, 32), waterMat).translateY(2.5).translateX(x).translateZ(z)); tempWaterZones.push({x: x, z: z, r: r}); 
        }

        for(let i=0; i<80; i++) {
            let x = (Math.random() - 0.5) * MAP_SIZE; let z = (Math.random() - 0.5) * MAP_SIZE;
            if (Math.abs(x) < 1500 && Math.abs(z) < 1500) continue; 
            let h = Math.random() * 1200 + 600; let r = h * 0.8;
            const mountain = new THREE.Mesh(new THREE.ConeGeometry(r, h, 7), new THREE.MeshStandardMaterial({color: 0x2f3e25}));
            mountain.position.set(x, h/2, z); mountain.rotation.y = Math.random() * Math.PI; scene.add(mountain);
            mountains.push({x: x, z: z, r: r}); 
        }

        function isInsideMountain(x, z, padding = 0) {
            for(let m of mountains) { let dx = x - m.x; let dz = z - m.z; if (dx*dx + dz*dz < (m.r + padding)*(m.r + padding)) return true; } return false;
        }

        for(let w of tempWaterZones) {
            if(!isInsideMountain(w.x, w.z, 0)) waterZones.push(w);
        }

        function isInWater(pos) {
            for(let w of waterZones) { let dx = pos.x - w.x; let dz = pos.z - w.z; if (dx*dx + dz*dz < w.r*w.r) return true; } return false;
        }

        function applyMountainCollision(entity) {
            let pos = entity.group ? entity.group.position : entity.mesh.position;
            for(let m of mountains) {
                let dx = pos.x - m.x; let dz = pos.z - m.z;
                let distSq = dx*dx + dz*dz;
                
                if (distSq < m.r * m.r) {
                    let dist = Math.sqrt(distSq); if (dist === 0) { dx = 1; dz = 0; dist = 1; }
                    let overlap = m.r - dist; 
                    pos.x += (dx / dist) * overlap; pos.z += (dz / dist) * overlap;
                }
            }
            if(entities.buildings) {
                entities.buildings.forEach(b => {
                    if (b.active) {
                        if (entity.id && b.owner === entity.id) return;
                        let dx = pos.x - b.position.x; let dz = pos.z - b.position.z;
                        let distSq = dx*dx + dz*dz;
                        if (distSq < 70*70) {
                            let dist = Math.sqrt(distSq); if (dist === 0) { dx = 1; dz = 0; dist = 1; }
                            let overlap = 70 - dist;
                            pos.x += (dx / dist) * overlap; pos.z += (dz / dist) * overlap;
                            if (entity.target) entity.target.copy(pos);
                        }
                    }
                });
            }
        }

        function removeFromScene(obj) {
            if (!obj) return;
            if (obj.group) scene.remove(obj.group);
            else if (obj.mesh) scene.remove(obj.mesh);
            else scene.remove(obj);
        }

        function dropResources(x, z, type, count) {
            let dropType = type === 'wood' ? 'wood_drop' : (type === 'stone' ? 'stone_drop' : 'ore_drop');
            let color = type === 'wood' ? 0x8b5a2b : (type === 'stone' ? 0xaaaaaa : 0x3a404a);
            for(let i=0; i<count; i++) {
                const mesh = new THREE.Mesh(new THREE.BoxGeometry(4, 4, 4), new THREE.MeshStandardMaterial({color: color}));
                mesh.position.set(x + (Math.random()-0.5)*20, 2, z + (Math.random()-0.5)*20);
                mesh.castShadow = true; mesh.type = dropType; mesh.active = true;
                scene.add(mesh); entities.items.push(mesh);
            }
        }

        let entities = { trees: [], rocks: [], ores: [], animals: [], bots: [], buildings: [], items: [] };

        function spawnTree(x, z) {
            let valid = false; let attempts = 0;
            if (x === undefined || z === undefined) {
                while(!valid && attempts < 50) { 
                    x = (Math.random()-0.5)*MAP_LIMIT*2; z = (Math.random()-0.5)*MAP_LIMIT*2; 
                    if(!isInsideMountain(x, z, 50) && !isInWater({x:x, y:0, z:z})) valid = true; 
                    attempts++; 
                }
            } else { if(!isInsideMountain(x, z, 50)) valid = true; }
            if(!valid) return; 

            let isOak = Math.random() > 0.5; let isBerry = Math.random() > 0.7; 
            const tree = new THREE.Group(); tree.position.set(x, 0, z);
            if (isBerry) { 
                tree.add(new THREE.Mesh(new THREE.DodecahedronGeometry(25), new THREE.MeshStandardMaterial({color: 0x228B22})).translateY(15)); 
                tree.type = 'berry'; tree.maxHp = 20; tree.hp = 20; 
            } else { 
                tree.add(new THREE.Mesh(new THREE.CylinderGeometry(isOak?10:6, isOak?12:8, isOak?60:40), new THREE.MeshStandardMaterial({color: 0x4a2e00})).translateY(isOak?30:20)); 
                tree.add(new THREE.Mesh(isOak ? new THREE.DodecahedronGeometry(50) : new THREE.ConeGeometry(40, 90, 8), new THREE.MeshStandardMaterial({color: isOak?0x2e8b57:0x1e591e})).translateY(isOak?70:65)); 
                tree.type = 'wood'; tree.maxHp = isOak?80:50; tree.hp = tree.maxHp; 
            }
            tree.active = true; scene.add(tree); entities.trees.push(tree);
        }

        function spawnRock(x, z) {
            let valid = false; let attempts = 0;
            if (x === undefined || z === undefined) {
                while(!valid && attempts < 50) { 
                    x = (Math.random()-0.5)*MAP_LIMIT*2; z = (Math.random()-0.5)*MAP_LIMIT*2; 
                    if(!isInsideMountain(x, z, 50) && !isInWater({x:x, y:0, z:z})) valid = true; 
                    attempts++; 
                }
            } else { if(!isInsideMountain(x, z, 50)) valid = true; }
            if(!valid) return;

            const rock = new THREE.Mesh(new THREE.DodecahedronGeometry(Math.random()*20+15), new THREE.MeshStandardMaterial({color: 0x777777}));
            rock.position.set(x, 10, z); rock.castShadow = true; 
            rock.type = 'stone'; rock.maxHp = 100; rock.hp = 100; rock.active = true; 
            scene.add(rock); entities.rocks.push(rock);
        }

        function spawnOre(x, z) {
            let valid = false; let attempts = 0;
            if (x === undefined || z === undefined) {
                while(!valid && attempts < 50) { 
                    x = (Math.random()-0.5)*MAP_LIMIT*2; z = (Math.random()-0.5)*MAP_LIMIT*2; 
                    if(!isInsideMountain(x, z, 50) && !isInWater({x:x, y:0, z:z})) valid = true; 
                    attempts++; 
                }
            } else { if(!isInsideMountain(x, z, 50)) valid = true; }
            if(!valid) return;

            const oreMat = new THREE.MeshStandardMaterial({color: 0x3a404a, metalness: 0.8, roughness: 0.3});
            const ore = new THREE.Mesh(new THREE.DodecahedronGeometry(Math.random()*15+12, 1), oreMat);
            ore.position.set(x, 8, z); ore.castShadow = true; 
            ore.type = 'ore'; ore.maxHp = 150; ore.hp = 150; ore.active = true; 
            scene.add(ore); entities.ores.push(ore);
        }

        for(let i=0; i<400; i++) spawnTree();
        for(let i=0; i<150; i++) spawnRock();
        for(let i=0; i<80; i++) spawnOre();

        for(let i=0; i<800; i++) {
            let x, z; let valid = false; let attempts = 0;
            while(!valid && attempts < 50) { 
                x = (Math.random()-0.5)*MAP_LIMIT*2; z = (Math.random()-0.5)*MAP_LIMIT*2; 
                if(!isInsideMountain(x, z, 50) && !isInWater({x:x, y:0, z:z})) valid = true; 
                attempts++; 
            }
            if(!valid) continue;
            const branch = new THREE.Mesh(new THREE.CylinderGeometry(0.8, 0.8, 12), new THREE.MeshStandardMaterial({color: 0x5c4033}));
            branch.rotation.x = Math.PI/2; branch.rotation.z = Math.random() * Math.PI; branch.position.set(x, 1, z); branch.castShadow = true; branch.type = 'wood_item'; branch.active = true; scene.add(branch); entities.items.push(branch);
        }

        for(let i=0; i<500; i++) {
            let x, z; let valid = false; let attempts = 0;
            while(!valid && attempts < 50) { 
                x = (Math.random()-0.5)*MAP_LIMIT*2; z = (Math.random()-0.5)*MAP_LIMIT*2; 
                if(!isInsideMountain(x, z, 50) && !isInWater({x:x, y:0, z:z})) valid = true; 
                attempts++; 
            }
            if(!valid) continue;
            const pebble = new THREE.Mesh(new THREE.DodecahedronGeometry(3), new THREE.MeshStandardMaterial({color: 0x888888}));
            pebble.position.set(x, 2, z); pebble.castShadow = true; pebble.type = 'stone_item'; pebble.active = true; scene.add(pebble); entities.items.push(pebble);
        }

        // ==========================================
        // 2. ĐỘNG VẬT
        // ==========================================
        const SPECIES = {
            'Thỏ': { color: 0xffffff, scale: 0.8, speed: 2.0, diet: 'herbivore', behavior: 'flee', meat: 2, fur: 1, hp: 20, dmg: 1, cap: 40 },
            'Hươu': { color: 0xd2a679, scale: 1.8, speed: 2.5, diet: 'herbivore', behavior: 'flee', meat: 6, fur: 3, hp: 50, dmg: 5, cap: 25 },
            'Lợn rừng': { color: 0x5c4033, scale: 1.5, speed: 1.8, diet: 'omnivore', behavior: 'aggressive', meat: 5, fur: 2, hp: 60, dmg: 12, cap: 15 },
            'Cáo': { color: 0xd95a00, scale: 1.2, speed: 2.6, diet: 'carnivore', behavior: 'hunt_small', meat: 3, fur: 2, hp: 40, dmg: 8, cap: 10 },
            'Gấu': { color: 0x3b2f2f, scale: 2.5, speed: 1.5, diet: 'carnivore', behavior: 'aggressive', meat: 10, fur: 5, hp: 150, dmg: 25, cap: 8 }
        };

        class Animal3D {
            constructor(speciesName, spawnX=null, spawnZ=null) {
                this.species = speciesName; const sp = SPECIES[speciesName];
                this.level = 1; this.age = 0; this.maxHp = sp.hp; this.hp = this.maxHp; 
                this.active = true; this.baseSpeed = sp.speed; this.behavior = sp.behavior; this.baseDmg = sp.dmg;
                
                this.food = 100; 
                this.isCrazy = false; 
                this.attackCooldown = 0; 
                this.attackAnimTimer = 0; 
                this.mountainBlockTimer = 0;

                this.mesh = new THREE.Group(); 
                let sx, sz;
                if(spawnX !== null) { sx = spawnX; sz = spawnZ; } 
                else { 
                    let valid = false; let att=0; 
                    while(!valid && att<50) { sx = (Math.random()-0.5)*MAP_LIMIT*1.5; sz = (Math.random()-0.5)*MAP_LIMIT*1.5; if(!isInsideMountain(sx, sz, 50) && !isInWater({x:sx, y:0, z:sz})) valid = true; att++; } 
                }
                this.mesh.position.set(sx || 0, 0, sz || 0);

                const bodyMat = new THREE.MeshStandardMaterial({color: sp.color});
                this.body = new THREE.Group(); this.body.position.y = 12; this.mesh.add(this.body);
                this.body.add(new THREE.Mesh(new THREE.BoxGeometry(10, 8, 18), bodyMat));
                
                let headGeo = new THREE.BoxGeometry(6, 6, 8);
                if(speciesName === 'Lợn rừng') headGeo = new THREE.BoxGeometry(8, 7, 10); if(speciesName === 'Gấu') headGeo = new THREE.BoxGeometry(10, 10, 12);
                this.body.add(new THREE.Mesh(headGeo, bodyMat).translateY(5).translateZ(10));
                
                const createLeg = (x, z) => { const leg = new THREE.Group(); leg.position.set(x, -2, z); leg.add(new THREE.Mesh(new THREE.BoxGeometry(2, 6, 2), bodyMat).translateY(-3)); this.body.add(leg); return leg; };
                this.legs = [createLeg(-4, -6), createLeg(4, -6), createLeg(-4, 6), createLeg(4, 6)];
                
                let startScale = sp.scale * (spawnX !== null ? 0.7 : 1.0);
                this.mesh.scale.set(startScale, startScale, startScale); scene.add(this.mesh);
                this.target = new THREE.Vector3(); this.pickTarget(); this.animOffset = Math.random() * 100;

                this.labelElement = document.createElement('div'); this.labelElement.className = 'animal-label'; document.getElementById('labels-container').appendChild(this.labelElement);
            }
            
            takeDamage(amount, attacker) {
                if(this.hp <= 0) return;
                this.hp -= amount;
                if(this.hp > 0) {
                    if (this.behavior === 'aggressive' || this.behavior === 'hunt_small' || this.species === 'Lợn rừng' || this.isCrazy) {
                        this.target.copy(attacker.group ? attacker.group.position : attacker.position);
                    } else {
                        let dir = new THREE.Vector3().subVectors(this.mesh.position, attacker.group ? attacker.group.position : attacker.position).normalize();
                        this.target.copy(this.mesh.position).add(dir.multiplyScalar(600));
                    }
                }
            }

            pickTarget() { 
                let valid = false; let attempts = 0; let tx, tz;
                while(!valid && attempts < 50) {
                    tx = this.mesh.position.x + (Math.random()-0.5)*1500; tz = this.mesh.position.z + (Math.random()-0.5)*1500;
                    if(!isInsideMountain(tx, tz, 50) && !isInWater({x:tx, y:0, z:tz})) valid = true; attempts++;
                }
                if(!valid) { tx = 0; tz = 0; } 
                this.target.set(tx, 0, tz); 
            }
            
            update() {
                if (!this.active || this.hp <= 0) { 
                    this.labelElement.style.display = 'none'; 
                    if (this.active) this.die();
                    return; 
                }

                let hitWall = false;
                if (this.mesh.position.x > MAP_LIMIT) { this.mesh.position.x = MAP_LIMIT; hitWall = true; }
                else if (this.mesh.position.x < -MAP_LIMIT) { this.mesh.position.x = -MAP_LIMIT; hitWall = true; }
                if (this.mesh.position.z > MAP_LIMIT) { this.mesh.position.z = MAP_LIMIT; hitWall = true; }
                else if (this.mesh.position.z < -MAP_LIMIT) { this.mesh.position.z = -MAP_LIMIT; hitWall = true; }
                if (hitWall) this.pickTarget();
                
                if (this.attackCooldown > 0) this.attackCooldown--; 

                this.food -= 0.015; 
                if (this.food <= 0) {
                    this.food = 0;
                    this.hp -= 0.1; 
                }

                let diet = SPECIES[this.species].diet;
                if (diet === 'carnivore' || diet === 'omnivore') {
                    if (this.food < 30) this.isCrazy = true; 
                    else if (this.food > 50) this.isCrazy = false;
                } else if (diet === 'herbivore') {
                    if (this.food < 50 && Math.random() < 0.05) { 
                        this.food = Math.min(100, this.food + 20);
                    }
                }

                let activeBehavior = this.isCrazy ? 'aggressive' : this.behavior;
                let currentSpeed = this.isCrazy ? this.baseSpeed * 1.5 : this.baseSpeed; 

                this.age++;
                if (this.age % 800 === 0 && this.level < 5) { this.level++; this.maxHp += 10; this.hp += 10; this.baseDmg += 2; this.mesh.scale.multiplyScalar(1.05); }
                if (this.age > 1200 && Math.random() < 0.005) {
                    if (entities.animals.filter(a => a.species === this.species && a.active).length < SPECIES[this.species].cap) { entities.animals.push(new Animal3D(this.species, this.mesh.position.x + (Math.random()-0.5)*50, this.mesh.position.z + (Math.random()-0.5)*50)); this.age = 500; }
                }

                let isMoving = false; let closestThreat = null; let threatDist = 800;
                
                if (activeBehavior === 'flee') { 
                    entities.bots.forEach(b => { if(b.stats.hp > 0 && b.state !== "dead") { let d = this.mesh.position.distanceTo(b.group.position); if (d < threatDist) { threatDist = d; closestThreat = b.group; }}}); 
                } else if (activeBehavior === 'hunt_small' || activeBehavior === 'aggressive') {
                    entities.bots.forEach(b => { if(b.stats.hp > 0 && b.state !== "dead" && b.state !== "begging") { let d = this.mesh.position.distanceTo(b.group.position); if (d < 400) { threatDist = d; closestThreat = b; }}}); 
                    if (this.isCrazy) {
                        entities.animals.forEach(a => { if(a.active && a !== this && a.hp > 0 && SPECIES[a.species].diet === 'herbivore') { let d = this.mesh.position.distanceTo(a.mesh.position); if (d < 400 && d < threatDist) { threatDist = d; closestThreat = a; }}});
                    }
                }

                if (closestThreat && Math.abs(this.mesh.position.x) < MAP_LIMIT && Math.abs(this.mesh.position.z) < MAP_LIMIT) { 
                    currentSpeed *= 1.5; 
                    if (activeBehavior === 'flee') { 
                        isMoving = true;
                        let dir = new THREE.Vector3().subVectors(this.mesh.position, closestThreat.position ? closestThreat.position : closestThreat.group.position).normalize(); 
                        let ftx = this.mesh.position.x + dir.x * 400; let ftz = this.mesh.position.z + dir.z * 400;
                        if (!isInsideMountain(ftx, ftz, 20) && !isInWater({x:ftx, y:0, z:ftz})) this.target.set(ftx, 0, ftz); 
                    } else { 
                        this.target.copy(closestThreat.group ? closestThreat.group.position : (closestThreat.mesh ? closestThreat.mesh.position : closestThreat.position)); 
                        
                        if (threatDist > 35) isMoving = true; 

                        if (threatDist < 45 && this.attackCooldown <= 0) { 
                            if (closestThreat.takeDamage && Math.random() < 0.1) {
                                closestThreat.takeDamage(this.baseDmg, this);
                                this.attackCooldown = 60; 
                                this.attackAnimTimer = 20; 
                                
                                let targetHp = closestThreat.stats ? closestThreat.stats.hp : closestThreat.hp;
                                if (targetHp <= 0) {
                                    this.food = 100;
                                    this.isCrazy = false;
                                }
                            }
                        }
                    } 
                } else { 
                    if (this.mesh.position.distanceTo(this.target) > 20) isMoving = true; else this.pickTarget(); 
                }

                if (isInsideMountain(this.target.x, this.target.z, 0)) { this.pickTarget(); }

                if(isInWater(this.mesh.position)) currentSpeed *= 0.3;

                if(isMoving) {
                    let dir = new THREE.Vector3().subVectors(this.target, this.mesh.position);
                    dir.y = 0; 
                    if(dir.lengthSq() > 0.001) { 
                        dir.normalize(); 
                        
                        let avoidance = new THREE.Vector3();
                        let hittingMountain = false;
                        for(let m of mountains) {
                            let dx = this.mesh.position.x - m.x;
                            let dz = this.mesh.position.z - m.z;
                            let distSq = dx*dx + dz*dz;
                            let avoidRadius = m.r + 100; 
                            if(distSq < avoidRadius * avoidRadius) {
                                hittingMountain = true;
                                let dist = Math.sqrt(distSq);
                                if(dist === 0) { dx=1; dz=0; dist=1; }
                                let pushForce = Math.pow((avoidRadius - dist) / avoidRadius, 2) * 5.0; 
                                avoidance.x += (dx / dist) * pushForce;
                                avoidance.z += (dz / dist) * pushForce;
                                
                                let dot = dir.x * (-dz) + dir.z * dx;
                                let sign = dot > 0 ? 1 : -1;
                                avoidance.x += (-dz / dist) * pushForce * sign * 1.5;
                                avoidance.z += (dx / dist) * pushForce * sign * 1.5;
                            }
                        }
                        
                        if (hittingMountain) {
                            this.mountainBlockTimer++;
                            if (this.mountainBlockTimer > 120) {
                                this.pickTarget();
                                this.mountainBlockTimer = 0;
                            }
                        } else {
                            this.mountainBlockTimer = 0;
                        }

                        for(let w of waterZones) {
                            let dx = this.mesh.position.x - w.x;
                            let dz = this.mesh.position.z - w.z;
                            let distSq = dx*dx + dz*dz;
                            let avoidRadius = w.r + 50;
                            if(distSq < avoidRadius * avoidRadius) {
                                let dist = Math.sqrt(distSq);
                                if(dist === 0) { dx=1; dz=0; dist=1; }
                                let pushForce = Math.pow((avoidRadius - dist) / avoidRadius, 2) * 6.0; 
                                avoidance.x += (dx / dist) * pushForce;
                                avoidance.z += (dz / dist) * pushForce;
                            }
                        }

                        if(avoidance.lengthSq() > 0) { 
                            avoidance.y = 0; dir.add(avoidance.multiplyScalar(2.0)); dir.y = 0; 
                        }

                        if(dir.lengthSq() > 0.001) {
                            dir.normalize();
                            this.mesh.position.add(dir.clone().multiplyScalar(currentSpeed)); 
                            
                            let lookTarget = new THREE.Vector3().copy(this.mesh.position).add(dir);
                            let currentQuat = this.mesh.quaternion.clone();
                            this.mesh.lookAt(lookTarget);
                            let targetQuat = this.mesh.quaternion.clone();
                            this.mesh.quaternion.copy(currentQuat);
                            this.mesh.quaternion.slerp(targetQuat, 0.15);
                        }
                    }
                    this.animOffset += currentSpeed * 0.15;
                    this.legs[0].rotation.x = -Math.sin(this.animOffset) * 0.5; this.legs[1].rotation.x = -Math.sin(this.animOffset + Math.PI) * 0.5; this.legs[2].rotation.x = -Math.sin(this.animOffset + Math.PI) * 0.5; this.legs[3].rotation.x = -Math.sin(this.animOffset) * 0.5;
                    if (this.species === 'Thỏ') this.body.position.y = 12 + Math.abs(Math.sin(this.animOffset)) * 5;
                } else {
                    this.legs[0].rotation.x = 0; this.legs[1].rotation.x = 0; this.legs[2].rotation.x = 0; this.legs[3].rotation.x = 0;
                }
                
                if (this.attackAnimTimer > 0) {
                    this.attackAnimTimer--;
                    this.body.rotation.x = -Math.sin(this.attackAnimTimer * 0.3) * 0.4; 
                } else {
                    this.body.rotation.x = 0;
                }
                
                applyMountainCollision(this);

                const vector = new THREE.Vector3(); this.mesh.getWorldPosition(vector);
                vector.y += 30 * this.mesh.scale.y; vector.project(camera);
                const x = (vector.x * .5 + .5) * window.innerWidth; const y = (vector.y * -.5 + .5) * window.innerHeight;
                if (vector.z < 1 && !isNaN(x) && !isNaN(y)) {
                    this.labelElement.style.display = 'block'; this.labelElement.style.left = `${x}px`; this.labelElement.style.top = `${y}px`;
                    let crazyText = this.isCrazy ? `<div class="crazy-mode">💢 ĐÓI/HÓA ĐIÊN</div>` : ``;
                    this.labelElement.innerHTML = `Lv.${this.level} ${this.species} ${crazyText}<br> <div style="width:100%; height:2px; background:red; margin-top:2px;"><div style="width:${(this.hp/this.maxHp)*100}%; height:100%; background:#00ff00;"></div></div>`;
                } else { this.labelElement.style.display = 'none'; }
            }
            
            die() {

                removeFromScene(this.mesh);
                if (this.labelElement && this.labelElement.parentNode) {

        }

                    const handle = new THREE.Mesh(new THREE.CylinderGeometry(0.6, 0.6, 16), new THREE.MeshStandardMaterial({color: 0x5c4033})); handle.rotation.x = Math.PI/2; handle.position.z = 8;
                    const headGrp = new THREE.Group();
                    const headMat = new THREE.MeshStandardMaterial({color: isIron ? 0xaaaaaa : 0x777777, metalness: isIron?0.8:0});
                    const head1 = new THREE.Mesh(new THREE.ConeGeometry(1.5, 10, 4), headMat); head1.rotation.x = Math.PI/2; head1.position.z = 5;
                    const head2 = new THREE.Mesh(new THREE.ConeGeometry(1.5, 10, 4), headMat); head2.rotation.x = -Math.PI/2; head2.position.z = -5;
                    headGrp.add(head1, head2); headGrp.position.z = 14;
                    headGrp.castShadow = true; handle.castShadow = true;
                    this.weaponGroup.add(handle, headGrp); 
                    this.damage = isIron ? 20 : 10; 
                    this.bonusCrit = isIron ? 0.4 : 0.2; 
                }
                else if (type === "Kiếm Đá") {
                    const handle = new THREE.Mesh(new THREE.CylinderGeometry(0.8, 0.8, 5), new THREE.MeshStandardMaterial({color: 0x3b2f2f})); handle.rotation.x = Math.PI/2; handle.position.z = 2.5;
                    const guard = new THREE.Mesh(new THREE.BoxGeometry(6, 1, 2), new THREE.MeshStandardMaterial({color: 0x555555})); guard.rotation.x = Math.PI/2; guard.position.z = 5;
                    const blade = new THREE.Mesh(new THREE.BoxGeometry(3, 15, 1), new THREE.MeshStandardMaterial({color: 0xaaaaaa})); blade.rotation.x = Math.PI/2; blade.position.z = 13;
                    blade.castShadow = true; handle.castShadow = true; guard.castShadow = true;
                    this.weaponGroup.add(handle, guard, blade); this.damage = 18;
                } else if (type === "Cung Gỗ") {
                    const bowGeo = new THREE.TorusGeometry(6, 0.8, 8, 16, Math.PI);
                    const bow = new THREE.Mesh(bowGeo, new THREE.MeshStandardMaterial({color: 0x4a2e00}));
                    bow.rotation.z = Math.PI/2; bow.rotation.y = Math.PI/2; bow.position.z = 2;
                    const string = new THREE.Mesh(new THREE.CylinderGeometry(0.1, 0.1, 12), new THREE.MeshBasicMaterial({color: 0xeeeeee}));
                    string.position.z = 2;
                    this.weaponGroup.add(bow, string); this.damage = 45;
                }
                else if (type === "Kiếm Sắt") {
                    const handle = new THREE.Mesh(new THREE.CylinderGeometry(0.6, 0.6, 6), new THREE.MeshStandardMaterial({color: 0x222222})); handle.rotation.x = Math.PI/2; handle.position.z = 3;
                    const guard = new THREE.Mesh(new THREE.BoxGeometry(8, 1.5, 2), new THREE.MeshStandardMaterial({color: 0xdaa520})); guard.rotation.x = Math.PI/2; guard.position.z = 6;
                    const blade = new THREE.Mesh(new THREE.BoxGeometry(4, 20, 0.5), new THREE.MeshStandardMaterial({color: 0xcccccc, metalness: 0.8, roughness: 0.2})); blade.rotation.x = Math.PI/2; blade.position.z = 16;
                    blade.castShadow = true; handle.castShadow = true; guard.castShadow = true;
                    this.weaponGroup.add(handle, guard, blade); this.damage = 30;
                }
            }

            gainXp(amount) {
                this.xp += amount;
                if (this.xp > this.level * 50) { 
                    this.level++; 
                    this.xp = 0; 
                    this.stats.maxHp += 20; 
                    this.stats.hp += 20; 
                    this.actionText = "🌟 THĂNG CẤP!"; 
                }
            }

            takeDamage(amount, attacker) {
                if (this.stats.hp <= 0 || this.state === "dead") return;
                let actualDmg = amount * (1 - this.defense);
                
                if (attacker && attacker.id && this.stats.hp - actualDmg <= 0 && this.stats.hp > 1) {
                    this.stats.hp = 1;
                    this.state = "begging";
                    this.actionText = "Xin tha mạng! 🏳️";
                    this.lockedTarget = null;
                    this.workTimer = 0;
                    
                    attacker.state = "executing";
                    attacker.lockedTarget = this;
                    attacker.actionText = "Đang phán xét...";
                    attacker.workTimer = 120; 
                    return; 
                }

                this.stats.hp -= actualDmg;
                if (this.stats.hp > 0 && attacker && this.state !== "begging") { 
                    this.workTimer = 0; 
                    this.lockedTarget = attacker; 
                    
                    if (this.stats.hp < this.stats.maxHp * 0.2) { 
                        if (this.state !== "flee" && this.state !== "desperate_attack") {
                            if (Math.random() < (this.mem.combatFocus * 0.4)) {
                                this.state = "desperate_attack";
                                this.actionText = "TỬ CHIẾN! 🩸⚔️";
                            } else {
                                this.state = "flee";
                                this.actionText = "BỎ CHẠY! 🏃";
                            }
                        }
                    } else { 
                        this.state = "attack"; 
                        this.actionText = "TỰ VỆ! ⚔️"; 
                    }
                }
            }

            gatherSpecific(woodNeeded, stoneNeeded, furNeeded, oreNeeded = 0) {
                let woodToReserve = 1;
                if (this.inv.wood < woodNeeded + woodToReserve) this.gatherResource('wood'); 
                else if (this.inv.stone < stoneNeeded) this.gatherResource('stone'); 
                else if (this.inv.fur < furNeeded) this.gatherResource('fur'); 
                else if (this.inv.ore < oreNeeded) this.gatherResource('ore'); 
                else this.gatherResource(Math.random() > 0.5 ? 'wood' : 'stone');
            }

            startWork(ticks, text, callback) {
                this.state = "working"; this.actionText = text; this.workTimer = ticks; this.onWorkComplete = callback;
            }

            decideAction() {
                if (["attack", "desperate_attack", "flee", "working", "sleeping", "resting", "begging", "executing"].includes(this.state)) return;
                if (this.stats.hp <= 0) return;

                this.decisionTimer = 120; 
                this.lockedTarget = null; this.workTimer = 0;

                if (Math.abs(this.group.position.x) > MAP_LIMIT || Math.abs(this.group.position.z) > MAP_LIMIT) { this.state = "wander"; this.actionText = "Trở về trung tâm"; this.target.set(0, 0, 0); this.lockedTarget = { type: 'point', position: this.target, active: true }; return; }

                if (this.stats.sleep < 15) {
                    if (this.buildings.bed) { this.state = "go_sleep"; this.lockedTarget = { type: 'bed', position: this.buildings.bed.position.clone(), active: true }; this.actionText = "Kiệt sức! Về nhà ngủ giường! 🏃💨"; return; } 
                    else if (this.buildings.house) { this.state = "go_sleep"; this.lockedTarget = { type: 'house', position: this.buildings.house.position.clone(), active: true }; this.actionText = "Kiệt sức! Về nhà ngủ sàn! 🏃💨"; return; } 
                    else { this.state = "sleeping"; this.actionText = "Ngất xỉu vì buồn ngủ... 💤"; return; }
                }

                if (this.stats.water < 20) { 
                    this.state = "find_water"; 
                    let closestWater = new THREE.Vector3(0,0,0); let minWDist = Infinity;
                    waterZones.forEach(w => {
                        let wp = new THREE.Vector3(w.x, 0, w.z);
                        if (isInsideMountain(wp.x, wp.z, 0)) return; 
                        let dist = this.group.position.distanceTo(wp);
                        if(dist < minWDist) { minWDist = dist; closestWater = wp; }
                    });
                    this.lockedTarget = { type: 'water', position: closestWater, active: true }; 
                    this.actionText = "Sắp chết khát! Đi tìm nước! 💧"; 
                    return; 
                }

                if (this.stats.sleep < this.mem.sleepThresh && this.stats.sleep < 90) {
                    if (this.buildings.bed) { this.state = "go_sleep"; this.lockedTarget = { type: 'bed', position: this.buildings.bed.position.clone(), active: true }; this.actionText = "Đến giờ đi ngủ 🏃💨"; return; } 
                    else if (this.buildings.house) { this.state = "go_sleep"; this.lockedTarget = { type: 'house', position: this.buildings.house.position.clone(), active: true }; this.actionText = "Về nhà đi ngủ 🏃💨"; return; } 
                }

                if (this.stats.water < this.mem.waterThresh) { 
                    this.state = "find_water"; 
                    let closestWater = new THREE.Vector3(0,0,0); let minWDist = Infinity;
                    waterZones.forEach(w => {
                        let wp = new THREE.Vector3(w.x, 0, w.z);
                        if (isInsideMountain(wp.x, wp.z, 0)) return; 
                        let dist = this.group.position.distanceTo(wp);
                        if(dist < minWDist) { minWDist = dist; closestWater = wp; }
                    });
                    this.lockedTarget = { type: 'water', position: closestWater, active: true }; 
                    this.actionText = "Đi tìm nguồn nước"; 
                    return; 
                }

                let needsHeal = this.stats.hp < this.stats.maxHp * 0.6;
                let needsFood = this.stats.food < this.mem.foodThresh;

                if (needsFood || needsHeal) {
                    let isEmergency = this.stats.hp < this.stats.maxHp * 0.4;
                    if (isEmergency && (this.inv.food > 0 || this.inv.meat > 0)) {
                        if (this.inv.food > 0) {
                            this.inv.food--; this.stats.food = Math.min(100, this.stats.food + 20); this.stats.water = Math.min(100, this.stats.water + 10); this.stats.hp = Math.min(this.stats.maxHp, this.stats.hp + 15); 
                            this.actionText = "Ăn mọng khẩn cấp 🍇"; return;
                        } else {
                            this.inv.meat--; this.stats.food = Math.min(100, this.stats.food + 30); this.stats.hp = Math.min(this.stats.maxHp, this.stats.hp + 15); 
                            this.actionText = "Ăn thịt sống khẩn cấp 🥩"; return;
                        }
                    }

                    if (this.inv.meat > 0) {
                        let isNearFire = this.buildings.campfire && this.group.position.distanceTo(this.buildings.campfire.position) < 300;
                        if (isNearFire) {
                            this.startWork(60, "Đang nướng thịt... 🥩🔥", () => {
                                this.inv.meat--;
                                this.stats.food = Math.min(100, this.stats.food + 60);
                                this.stats.hp = Math.min(this.stats.maxHp, this.stats.hp + 50); 
                            });
                            return;
                        } 
                        else if (this.buildings.campfire) {
                            this.state = "wander"; this.actionText = "Về bếp lửa nấu ăn";
                            this.target.copy(this.buildings.campfire.position);
                            this.lockedTarget = { type: 'point', position: this.target, active: true };
                            return;
                        } 
                        else {
                            if (this.inv.wood >= 5 && this.inv.stone >= 5) {
                                this.startWork(120, "Dựng Lửa trại nấu ăn", () => this.buildCampfire());
                            } else if (this.stats.hp < this.stats.maxHp * 0.3 || this.stats.food < 15) {
                                this.inv.meat--;
                                this.stats.food = Math.min(100, this.stats.food + 30);
                                this.stats.hp = Math.min(this.stats.maxHp, this.stats.hp + 15); 
                                this.actionText = "Ăn thịt sống cầm hơi! 🤢";
                            } else {
                                this.actionText = "Gom liệu làm Lửa trại nấu ăn"; 
                                this.gatherSpecific(5, 5, 0); 
                            }
                            return;
                        }
                    } else if (this.inv.food > 0) {
                        this.inv.food--;
                        this.stats.food = Math.min(100, this.stats.food + 20);
                        this.stats.water = Math.min(100, this.stats.water + 10); 
                        this.stats.hp = Math.min(this.stats.maxHp, this.stats.hp + 15); 
                        this.actionText = "Ăn quả mọng hồi sức 🍇";
                        return;
                    } else {
                        let easyMeat = entities.items.filter(i => (i.type === 'meat_item' || i.type === 'food_item' || i.type === 'berry') && i.active);
                        let closestFood = this.getClosest(easyMeat, 'all');
                        if (closestFood && this.group.position.distanceTo(closestFood.position) < 2000) {
                            this.state = "gather"; this.actionText = "Nhặt đồ ăn rớt để hồi phục 🥩";
                            this.lockedTarget = closestFood; return;
                        }
                        
                        this.state = Math.random() > 0.4 ? "hunt" : "gather"; 
                        if (needsHeal) this.state = "gather"; 
                        
                        this.actionText = this.state === "hunt" ? "Đi săn kiếm thịt" : "Tìm quả mọng";
                        this.lockedTarget = this.getClosest(this.state === "hunt" ? entities.animals : entities.trees, this.state === "hunt" ? 'all' : 'berry'); 
                        if (this.lockedTarget) return; 

                        this.state = "search_food";
                        this.actionText = "Đói/Thương nặng, đi tìm thức ăn... 🔍";
                        let validTarget = false; let attempts = 0; let tx, tz;
                        while(!validTarget && attempts < 20) {
                            tx = this.group.position.x + (Math.random()-0.5)*1500;
                            tz = this.group.position.z + (Math.random()-0.5)*1500;
                            if(!isInsideMountain(tx, tz, 50) && !isInWater({x:tx, y:0, z:tz})) validTarget = true;
                            attempts++;
                        }
                        if(!validTarget) { tx = 0; tz = 0; }
                        this.target.set(tx, 0, tz); 
                        this.lockedTarget = { type: 'point', position: this.target, active: true };
                        return;
                    }
                }

                let isNightTime = globalTime >= 18 || globalTime < 6;
                if (isNightTime && !this.hasTorch) {
                    if (this.inv.wood >= 1) { 
                        this.startWork(60, "Chế Đuốc soi đường...", () => { 
                            this.inv.wood -= 1; 
                            this.hasTorch = true; 
                            this.torchLife = 3000;
                        }); 
                    } else { 
                        this.actionText = "Mò mẫm tìm gỗ làm Đuốc"; this.gatherSpecific(1, 0, 0); 
                    } 
                    return;
                }
                
                if (this.mem.wantsBoat && !this.ownsBoat) {
                    if (this.inv.wood >= 20) {
                        this.startWork(200, "Đóng Thuyền qua sông ⛵", () => { this.inv.wood -= 20; this.ownsBoat = true; this.mem.wantsBoat = false; }); return;
                    } else {
                        this.state = "gather"; this.actionText = "Bị chặn! Cần 20 gỗ đóng Thuyền ⛵"; this.gatherSpecific(20, 0, 0); return;
                    }
                }

                let dropItems = entities.items.filter(i => (i.type === 'meat_item' || i.type === 'fur_item') && i.active);
                let closestLoot = this.getClosest(dropItems, 'all'); 
                if (closestLoot && this.group.position.distanceTo(closestLoot.position) < (isNightTime && !this.hasTorch ? 300 : 1500)) {
                    this.state = "gather"; this.actionText = "Thu chiến lợi phẩm";
                    this.lockedTarget = closestLoot;
                    return;
                }

                if (this.combatWeapon === "Tay không") {
                    if (this.inv.wood >= 1) { this.startWork(90, "Làm Gậy Gỗ...", () => { this.inv.wood -= 1; this.combatWeapon = "Gậy Gỗ"; }); } else { this.actionText = "Tìm cành cây"; this.gatherSpecific(1, 0, 0); } return;
                }
                
                if (this.level >= 2) {
                    if (this.tools.pickaxe < 1) {
                        if (this.inv.wood >= 3 && this.inv.stone >= 5) { this.startWork(120, "Làm Cuốc Chim Đá ⛏️", () => { this.inv.wood -= 3; this.inv.stone -= 5; this.tools.pickaxe = 1; }); return; }
                        else { this.actionText = "Gom liệu làm Cuốc Chim Đá"; this.gatherSpecific(3, 5, 0); return; }
                    }
                    if (this.tools.axe < 1) {
                        if (this.inv.wood >= 3 && this.inv.stone >= 5) { this.startWork(120, "Làm Rìu Đá 🪓", () => { this.inv.wood -= 3; this.inv.stone -= 5; this.tools.axe = 1; }); return; }
                        else { this.actionText = "Gom liệu làm Rìu Đá"; this.gatherSpecific(3, 5, 0); return; }
                    }
                    if (this.tools.spear < 1) {
                        if (this.inv.wood >= 1 && this.inv.stone >= 3) { this.startWork(120, "Làm Giáo Đá 🗡️", () => { this.inv.wood -= 1; this.inv.stone -= 3; this.tools.spear = 1; this.combatWeapon = "Giáo Đá"; }); return; }
                        else { this.actionText = "Gom liệu làm Giáo Đá"; this.gatherSpecific(1, 3, 0); return; }
                    }
                    if (this.tools.shield < 1) {
                        if (this.inv.wood >= 4 && this.inv.stone >= 2) { this.startWork(120, "Làm Khiên Gỗ 🛡️", () => { this.inv.wood -= 4; this.inv.stone -= 2; this.tools.shield = 1; this.setShield("Khiên Gỗ"); }); return; }
                        else { this.actionText = "Gom liệu làm Khiên Gỗ"; this.gatherSpecific(4, 2, 0); return; }
                    }
                }

                if (this.level >= 4) {
                    if (!this.buildings.house) {
                        let canBuildStone = this.inv.stone >= 10;
                        let canBuildWood = this.inv.wood >= 10;
                        if (canBuildStone) { this.startWork(180, "Xây Nhà Đá 🪨", () => this.buildHouse('stone')); return; }
                        else if (canBuildWood) { this.startWork(180, "Xây Nhà Gỗ 🪵", () => this.buildHouse('wood')); return; }
                        else { 
                            if (this.inv.stone > this.inv.wood) { this.actionText = "Gom đá xây Nhà (Lv.4)"; this.gatherSpecific(0, 10, 0); }
                            else { this.actionText = "Gom gỗ xây Nhà (Lv.4)"; this.gatherSpecific(10, 0, 0); }
                            return; 
                        }
                    }
                    if (this.buildings.house && !this.buildings.bed) {
                        if (this.inv.wood >= 5 + 1 && this.inv.fur >= 3) { this.startWork(120, "Đóng Giường ngủ 🛏️", () => this.buildBed()); return; }
                        else { this.actionText = "Săn thú làm Giường"; this.gatherSpecific(5, 0, 3); return; }
                    }
                    if (this.buildings.house && !this.buildings.campfire) {
                        if (this.inv.wood >= 5 + 1 && this.inv.stone >= 5) { this.startWork(120, "Đốt Lửa trại trước nhà 🔥", () => this.buildCampfire()); return; }
                        else { this.actionText = "Gom liệu Lửa trại"; this.gatherSpecific(5, 5, 0); return; }
                    }
                }

                if (this.level >= 5) {
                    if (this.tools.pickaxe < 2) {
                        if (this.inv.wood >= 3 && this.inv.ore >= 10) { this.startWork(150, "Rèn Cuốc Chim Sắt ⛏️", () => { this.inv.wood -= 3; this.inv.ore -= 10; this.tools.pickaxe = 2; }); return; }
                        else { this.actionText = "Gom quặng làm Cuốc Sắt"; this.gatherSpecific(3, 0, 0, 10); return; }
                    }
                    if (this.tools.axe < 2) {
                        if (this.inv.wood >= 3 && this.inv.ore >= 10) { this.startWork(150, "Rèn Rìu Sắt 🪓", () => { this.inv.wood -= 3; this.inv.ore -= 10; this.tools.axe = 2; }); return; }
                        else { this.actionText = "Gom quặng làm Rìu Sắt"; this.gatherSpecific(3, 0, 0, 10); return; }
                    }
                    if (this.tools.spear < 2) {
                        if (this.inv.wood >= 1 && this.inv.ore >= 10) { this.startWork(150, "Rèn Giáo Sắt 🗡️", () => { this.inv.wood -= 1; this.inv.ore -= 10; this.tools.spear = 2; this.combatWeapon = "Giáo Sắt"; }); return; }
                        else { this.actionText = "Gom quặng làm Giáo Sắt"; this.gatherSpecific(1, 0, 0, 10); return; }
                    }
                    if (this.tools.shield < 2) {
                        if (this.inv.wood >= 4 && this.inv.ore >= 15) { this.startWork(150, "Rèn Khiên Sắt 🛡️", () => { this.inv.wood -= 4; this.inv.ore -= 15; this.tools.shield = 2; this.setShield("Khiên Sắt"); }); return; }
                        else { this.actionText = "Gom quặng làm Khiên Sắt"; this.gatherSpecific(4, 0, 0, 15); return; }
                    }
                }

                if (this.buildings.house && this.level >= 3 && this.inv.food > 15) {
                    let nearbyBushes = entities.trees.filter(t => t.type === 'berry' && t.active && t.position.distanceTo(this.buildings.house.position) < 400).length;
                    if (nearbyBushes < 3) {
                        this.startWork(150, "Đang gieo hạt trồng Berry 🌱", () => this.plantFarm());
                        return;
                    }
                }

                if (this.inv.food < 15) {
                    this.state = "gather"; this.actionText = "Thu thập trữ trái cây 🍇";
                    this.lockedTarget = this.getClosest(entities.trees, 'berry');
                    if (this.lockedTarget) return;
                }
                if (this.inv.meat < 5) {
                    this.state = "hunt"; this.actionText = "Đi săn trữ thịt dự phòng 🥩";
                    this.lockedTarget = this.getClosest(entities.animals, 'all');
                    if (this.lockedTarget) return;
                }
                if (this.inv.wood < 20) {
                    this.actionText = "Chặt cây trữ Gỗ 🌲"; this.gatherSpecific(20, 0, 0); return;
                }
                if (this.inv.stone < 15) {
                    this.actionText = "Khai thác trữ Đá 🪨"; this.gatherSpecific(0, 15, 0); return;
                }

                this.state = "wander"; this.actionText = "Khám phá / Tuần tra";
                let validTarget = false; let attempts = 0; let tx, tz;
                while(!validTarget && attempts < 50) {
                    tx = this.group.position.x + (Math.random()-0.5)*1500;
                    tz = this.group.position.z + (Math.random()-0.5)*1500;
                    if(!isInsideMountain(tx, tz, 50) && !isInWater({x:tx, y:0, z:tz})) validTarget = true;
                    attempts++;
                }
                if(!validTarget) { tx = 0; tz = 0; }
                this.lockedTarget = { type: 'point', position: new THREE.Vector3(tx, 0, tz), active: true };
            }

            gatherResource(type) {
                let drops = entities.items.filter(i => i.type === type + '_drop' && i.active);
                this.lockedTarget = this.getClosest(drops, type);
                
                if (!this.lockedTarget) {
                    let list = [];
                    if (type === 'wood') {
                        if (this.tools.axe > 0) list = entities.trees.filter(t => t.type === 'wood' && t.active).concat(entities.items.filter(i => i.type === 'wood_item' && i.active));
                        else list = entities.items.filter(i => i.type === 'wood_item' && i.active);
                    }
                    else if (type === 'stone') {
                        if (this.tools.pickaxe > 0) list = entities.rocks.filter(r => r.active).concat(entities.items.filter(i => i.type === 'stone_item' && i.active));
                        else list = entities.items.filter(i => i.type === 'stone_item' && i.active);
                    }
                    else if (type === 'ore') {
                        if (this.tools.pickaxe > 0) list = entities.ores.filter(o => o.active);
                    }
                    else if (type === 'fur') {
                        list = entities.items.filter(i => i.type === 'fur_item' && i.active);
                        if (list.length === 0) { list = entities.animals.filter(a => a.active); this.state = "hunt"; }
                    }
                    this.lockedTarget = this.getClosest(list, type);
                }

                if(this.lockedTarget) { 
                    if (this.state !== "hunt") this.state = "gather"; 
                    if (this.lockedTarget.type && this.lockedTarget.type.includes('_item')) this.actionText = `Nhặt ${type==='wood'?'cành gỗ':(type==='fur_item'?'lông thú rơi':'đá cuội')}`;
                    else if (this.lockedTarget.type && this.lockedTarget.type.includes('_drop')) this.actionText = `Thu gom ${type==='wood'?'gỗ rơi':(type==='stone'?'đá rơi':'quặng rơi')}`;
