                        else if (['gather', 'hunt', 'attack', 'desperate_attack'].includes(this.state) && d < atkRange && this.lockedTarget.type !== 'point') {
                            
                            this.equipForTask(this.lockedTarget);

                            let vecCheck = new THREE.Vector3().subVectors(targetPos, this.group.position);
                            if (vecCheck.lengthSq() > 0.001) {
                                let currentQuat = this.group.quaternion.clone();
                                this.group.lookAt(targetPos);
                                let targetQuat = this.group.quaternion.clone();
                                this.group.quaternion.copy(currentQuat);
                                this.group.quaternion.slerp(targetQuat, 0.3);
                            }

                            // XỬ LÝ NHẶT ĐỒ HÀNG LOẠT (AOE LOOTING)
                            if (this.lockedTarget.type && (this.lockedTarget.type.includes('_item') || this.lockedTarget.type.includes('_drop'))) {
                                this.armR.rotation.x = -Math.PI/4; 
                                
                                let pickedCount = 0;
                                let itemsToPick = entities.items.filter(i => i.active && i.position.distanceTo(this.group.position) < 120);
                                
                                itemsToPick.forEach(item => {
                                    item.active = false;
                                    removeFromScene(item);
                                    if(item.type === 'wood_item') { this.inv.wood += 1; } 
                                    else if(item.type === 'stone_item') { this.inv.stone += 1; }
                                    else if(item.type === 'wood_drop') { this.inv.wood += 2; } 
                                    else if(item.type === 'stone_drop') { this.inv.stone += 2; }
                                    else if(item.type === 'ore_drop') { this.inv.ore += 1; }
                                    else if(item.type === 'meat_item') { this.inv.meat += 1; } 
                                    else if(item.type === 'fur_item') { this.inv.fur += 1; }
                                    pickedCount++;
                                });

                                this.gainXp(pickedCount); 
                                this.state = "idle"; 
                                this.lockedTarget = null; 
                                this.actionText = "Đã gom đồ khu vực này 🎒";
                            } else {
                                if (this.weaponName === "Cung Gỗ" && this.attackCooldown <= 0) {
                                    this.armR.rotation.x = -Math.PI/2;
                                    if (!isRunningHome && !this.isExhausted) this.stats.stam = Math.max(0, this.stats.stam - 0.2);
                                    
                                    const arrow = new THREE.Mesh(new THREE.CylinderGeometry(0.5, 0.5, 10), new THREE.MeshBasicMaterial({color: 0xeeeeee}));
                                    arrow.position.copy(this.group.position); arrow.position.y += 20;
                                    arrow.lookAt(targetPos); 
                                    arrow.rotateX(-Math.PI/2); 
                                    scene.add(arrow);
                                    
                                    let isCrit = (Math.random() < (0.1 + this.bonusCrit)) || (isAlert && Math.random() < 0.3); 
                                    let finalDmg = isCrit ? currentDmg * 2 : currentDmg;
                                    
                                    let isResource = ['wood', 'stone', 'ore', 'berry'].includes(this.lockedTarget.type);
                                    if (isResource) {
                                        if (this.lockedTarget.type === 'wood' && this.tools.axe < 1) finalDmg = 0;
                                        else if ((this.lockedTarget.type === 'stone' || this.lockedTarget.type === 'ore') && this.tools.pickaxe < 1) finalDmg = 0;
                                        else finalDmg = 5; 
                                    }

                                    if (finalDmg > 0) {
                                        projectiles.push({ mesh: arrow, target: this.lockedTarget, dmg: finalDmg, shooter: this, speed: 15 });
                                        this.attackCooldown = 40;
                                    } else {
                                        this.lockedTarget = null; this.state = "idle";
                                    }
                                } 
                                else if (this.weaponName !== "Cung Gỗ") {
                                    this.armR.rotation.x = Math.sin(Date.now()*0.02) - 1.5; 
                                    
                                    if (this.attackCooldown <= 0) {
                                        if (!isRunningHome && !this.isExhausted) this.stats.stam = Math.max(0, this.stats.stam - 0.2); 
                                        let isCrit = (Math.random() < (0.1 + this.bonusCrit)) || (isAlert && Math.random() < 0.3); 
                                        let finalDmg = isCrit ? currentDmg * 2 : currentDmg;
                                        
                                        let isResource = ['wood', 'stone', 'ore', 'berry'].includes(this.lockedTarget.type);
                                        if (isResource) {
                                            if (this.lockedTarget.type === 'wood' && this.tools.axe < 1) { finalDmg = 0; this.actionText = "Cần có Rìu để chặt cây!"; }
                                            else if ((this.lockedTarget.type === 'stone' || this.lockedTarget.type === 'ore') && this.tools.pickaxe < 1) { finalDmg = 0; this.actionText = "Cần có Cuốc Chim để đập đá!"; }
                                            else if ((this.weaponName === "Rìu Đá" || this.weaponName === "Rìu Sắt") && this.lockedTarget.type === 'wood') finalDmg = 40;
                                            else if ((this.weaponName === "Cuốc Chim Đá" || this.weaponName === "Cuốc Chim Sắt") && (this.lockedTarget.type === 'stone' || this.lockedTarget.type === 'ore')) finalDmg = 40;
                                            else finalDmg = 5; 
                                        }

                                        if (finalDmg > 0) {
                                            if (this.lockedTarget.takeDamage) this.lockedTarget.takeDamage(finalDmg, this); else this.lockedTarget.hp -= finalDmg;
                                            this.attackCooldown = 30;

                                            if (isResource && this.lockedTarget.hp > 0) {
                                                let ratio = this.lockedTarget.hp / this.lockedTarget.maxHp;
                                                if (this.lockedTarget.type === 'wood') {
                                                    this.lockedTarget.scale.y = Math.max(0.1, ratio); 
                                                    if (ratio <= 0.5 && this.lockedTarget.children[1]) this.lockedTarget.children[1].visible = false; 
                                                } else if (this.lockedTarget.type === 'berry') {
                                                    if (this.lockedTarget.children[0]) this.lockedTarget.children[0].scale.set(Math.max(0.1, ratio), Math.max(0.1, ratio), Math.max(0.1, ratio));
                                                } else if (this.lockedTarget.type === 'stone' || this.lockedTarget.type === 'ore') {
                                                    let scale = Math.max(0.2, ratio);
                                                    this.lockedTarget.scale.set(scale, scale, scale);
                                                }
                                            }

                                            if(this.lockedTarget.hp <= 0) {
                                                this.lockedTarget.active = false; 
                                                
                                                if(this.lockedTarget.species) { 
                                                    let l = this.lockedTarget.level || 1; 
                                                    if(typeof this.lockedTarget.die === 'function') this.lockedTarget.die(); 
                                                    this.gainXp(10 * l); 
                                                }
                                                else if(this.lockedTarget.id) {
                                                    if(typeof this.lockedTarget.die === 'function') this.lockedTarget.die();
                                                    this.gainXp(50);
                                                }
                                                else if(this.lockedTarget.type === 'wood') { this.inv.wood += 10; dropResources(this.lockedTarget.position.x, this.lockedTarget.position.z, 'wood', 2); removeFromScene(this.lockedTarget); this.gainXp(2); }
                                                else if(this.lockedTarget.type === 'stone') { this.inv.stone += 10; dropResources(this.lockedTarget.position.x, this.lockedTarget.position.z, 'stone', 2); removeFromScene(this.lockedTarget); this.gainXp(2); }
                                                else if(this.lockedTarget.type === 'ore') { this.inv.ore += 5; dropResources(this.lockedTarget.position.x, this.lockedTarget.position.z, 'ore', 2); removeFromScene(this.lockedTarget); this.gainXp(5); }
                                                else if(this.lockedTarget.type === 'berry') { this.inv.food += 4; removeFromScene(this.lockedTarget); }
                                                
                                                this.state = "idle"; this.lockedTarget = null; this.actionText = "Đã phá vỡ tài nguyên!";
                                            }
                                        } else {
                                            this.lockedTarget = null; this.state = "idle";
                                        }
                                    }
                                }
                            }
                        }
                        else if (d > 20) { 
                            let dir = new THREE.Vector3().subVectors(this.target, this.group.position);
                            dir.y = 0; 
                            if(dir.lengthSq() > 0.001) { 
                                dir.normalize(); 
                                
                                let avoidance = new THREE.Vector3();
                                let hittingMountain = false;
                                for(let m of mountains) {
                                    let dx = this.group.position.x - m.x;
                                    let dz = this.group.position.z - m.z;
                                    let distSq = dx*dx + dz*dz;
                                    let avoidRadius = m.r + 150; 
                                    if(distSq < avoidRadius * avoidRadius) {
                                        hittingMountain = true;
                                        let dist = Math.sqrt(distSq);
                                        if(dist === 0) { dx=1; dz=0; dist=1; }
                                        let pushForce = Math.pow((avoidRadius - dist) / avoidRadius, 2) * 5.0; 
                                        avoidance.x += (dx / dist) * pushForce;
                                        avoidance.z += (dz / dist) * pushForce;
                                        
                                        // NÉ TRÁNH TIẾP TUYẾN
                                        let dot = dir.x * (-dz) + dir.z * dx;
                                        let sign = dot > 0 ? 1 : -1;
                                        avoidance.x += (-dz / dist) * pushForce * sign * 1.5;
                                        avoidance.z += (dx / dist) * pushForce * sign * 1.5;
                                    }
                                }

                                if (hittingMountain) {
                                    this.mountainBlockTimer = (this.mountainBlockTimer || 0) + 1;
                                    if (this.mountainBlockTimer > 120) {
                                        if (this.lockedTarget && this.lockedTarget.type !== 'point') this.lockedTarget.blacklistTime = Date.now() + 10000;
                                        this.lockedTarget = null;
                                        if (this.state === "flee") {
                                            let newDir = new THREE.Vector3((Math.random()-0.5), 0, (Math.random()-0.5)).normalize();
                                            let ftx = this.group.position.x + newDir.x * 600;
                                            let ftz = this.group.position.z + newDir.z * 600;
                                            this.target.set(ftx, 0, ftz);
                                            this.actionText = "Đổi hướng bỏ chạy!";
                                        } else {
                                            this.state = "idle";
                                            this.actionText = "Núi chặn đường! Đổi mục tiêu ⛰️";
                                        }
                                        this.mountainBlockTimer = 0;
                                    }
                                } else {
                                    this.mountainBlockTimer = 0;
                                }
                                
                                let waterPush = new THREE.Vector3();
                                if (!this.ownsBoat && this.state !== "find_water") {
                                    for(let w of waterZones) {
                                        let dx = this.group.position.x - w.x;
                                        let dz = this.group.position.z - w.z;
                                        let distSq = dx*dx + dz*dz;
                                        let avoidRadius = w.r + 80;
                                        if(distSq < avoidRadius * avoidRadius) {
                                            let dist = Math.sqrt(distSq);
                                            if(dist === 0) { dx=1; dz=0; dist=1; }
                                            let pushForce = Math.pow((avoidRadius - dist) / avoidRadius, 2) * 8.0; 
                                            waterPush.x += (dx / dist) * pushForce;
                                            waterPush.z += (dz / dist) * pushForce;
                                        }
                                    }
                                }
                                
                                if(waterPush.lengthSq() > 0) {
                                    avoidance.add(waterPush);
                                    this.waterBlockTimer = (this.waterBlockTimer || 0) + 1;
                                    if (this.waterBlockTimer > 30) {
                                        if (this.lockedTarget && this.lockedTarget.type !== 'point') this.lockedTarget.blacklistTime = Date.now() + 10000;
                                        this.lockedTarget = null;
                                        this.state = "idle";
                                        this.waterBlockTimer = 0;
                                        this.mem.wantsBoat = true;
                                        this.actionText = "Sông chặn đường! Cần chế Thuyền ⛵";
                                    }
                                } else {
                                    this.waterBlockTimer = 0;
                                }

                                if(avoidance.lengthSq() > 0) {
                                    avoidance.y = 0; dir.add(avoidance.multiplyScalar(2.0)); dir.y = 0; 
                                }

                                if (dir.lengthSq() > 0.001) {
                                    dir.normalize();
                                    this.group.position.add(dir.clone().multiplyScalar(currentSpeed)); 
                                    
                                    let lookTarget = new THREE.Vector3().copy(this.group.position).add(dir);
                                    let currentQuat = this.group.quaternion.clone();
                                    this.group.lookAt(lookTarget);
                                    let targetQuat = this.group.quaternion.clone();
                                    this.group.quaternion.copy(currentQuat);
                                    this.group.quaternion.slerp(targetQuat, 0.15); 
                                    
                                    if (!isRunningHome) { if (this.isExhausted) this.stats.stam = Math.min(100, this.stats.stam + 0.2); else this.stats.stam = Math.max(0, this.stats.stam - 0.05); }
                                    isMoving = true; 
                                }
                            }
                        } else { 
                            if (this.lockedTarget && this.lockedTarget.type === 'point') {
                                this.lockedTarget.active = false;
                                this.state = "idle";
                            }
                        }
                    }
                }

                applyMountainCollision(this);

                if (isMoving && this.state !== "resting" && this.state !== "begging") {
                    this.animOffset += currentSpeed * 0.15;
                    this.legL.rotation.x = -Math.sin(this.animOffset) * 0.6; this.legR.rotation.x = -Math.sin(this.animOffset + Math.PI) * 0.6;
                    
                    if (isHoldingTorch) {
                        this.armL.rotation.x = -Math.PI / 3 + Math.sin(this.animOffset) * 0.1; 
                    } else {
                        this.armL.rotation.x = -Math.sin(this.animOffset + Math.PI) * 0.5;
                    }

                    if(!['gather', 'hunt', 'search_food', 'search_resource', 'wander', 'attack', 'desperate_attack', 'working'].includes(this.state)) this.armR.rotation.x = -Math.sin(this.animOffset) * 0.5; 
                } else {
                    this.legL.rotation.x = 0; this.legR.rotation.x = 0; 
                    
                    if (isHoldingTorch) {
                        this.armL.rotation.x = -Math.PI / 3;
                    } else {
                        this.armL.rotation.x = 0; 
                    }

                    if(!['gather', 'hunt', 'search_food', 'search_resource', 'wander', 'attack', 'desperate_attack', 'working'].includes(this.state)) this.armR.rotation.x = 0;
                    
                    if (this.state === "begging") {
                        this.legL.rotation.x = -Math.PI/2; this.legR.rotation.x = -Math.PI/2;
                        this.armL.rotation.x = Math.PI; this.armR.rotation.x = Math.PI;
                    }
                }

                if (this.buildings.campfire) {
                    if (isNightTime) { 
                        this.buildings.campfire.fireMesh.visible = true; 
                        this.buildings.campfire.light.intensity = 2; 
                        this.buildings.campfire.fireMesh.scale.y = 1 + Math.sin(Date.now() * 0.01) * 0.2; 
                        
                        let distToFire = this.group.position.distanceTo(this.buildings.campfire.position);
                        if (distToFire < 150 && this.state !== "sleeping" && this.state !== "dead") {
                            this.stats.hp = Math.min(this.stats.maxHp, this.stats.hp + 0.1);
                            this.stats.stam = Math.min(100, this.stats.stam + 0.5);
                            if (this.state === "idle") this.actionText = "Đang sưởi ấm & hồi phục 🔥";
                        }
                    } else { 
                        this.buildings.campfire.fireMesh.visible = false; 
                        this.buildings.campfire.light.intensity = 0; 
                    }
                }

                this.updateUI();
            }

            updateUI() {
                if (this.state === "dead") { this.labelElement.style.display = 'none'; return; }
                const vector = new THREE.Vector3(); this.group.getWorldPosition(vector);
                vector.y += 65; vector.project(camera);
                const x = (vector.x * .5 + .5) * window.innerWidth; const y = (vector.y * -.5 + .5) * window.innerHeight;
                
                if (vector.z < 1 && !isNaN(x) && !isNaN(y)) {
                    this.labelElement.style.display = 'block'; this.labelElement.style.left = `${x}px`; this.labelElement.style.top = `${y}px`;
                    this.labelElement.style.borderColor = `#${this.color.toString(16).padStart(6,'0')}`;
                    
                    let despText = this.isDesperate ? `<div class="desperate-mode">💢 TRỌNG THƯƠNG 💢</div>` : ``;
                    let buffText = this.state === "go_sleep" ? `<div class="buff-mode">⚡ BUFF: CHẠY VỀ NHÀ</div>` : ``;
                    let alertText = this.alertTimer > 0 ? `<div class="alert-mode">⚠️ CẢNH GIÁC (x1.5 Dmg)</div>` : ``;
                    let exhaustText = (this.isExhausted && this.state !== "resting") ? `<span class="exhausted-text">[Lết Bộ]</span>` : ``;
                    
                    this.labelElement.innerHTML = `
                        <div style="display:flex; flex-direction:column; gap:3px;">
                            <div><b style="color:#${this.color.toString(16).padStart(6,'0')}">[Lv.${this.level}] ${this.name}</b> ${exhaustText}</div>
                            <div style="color:#aaa; font-style: italic;">${this.actionText}</div>
                            ${despText} ${buffText} ${alertText}
                            <div class="stat-row"><span class="stat-icon">❤️</span><div class="bar-container"><div class="bar-fill hp-fill" style="width:${(this.stats.hp/this.stats.maxHp)*100}%"></div></div></div>
                            <div class="stat-row"><span class="stat-icon">🍖</span><div class="bar-container"><div class="bar-fill food-fill" style="width:${this.stats.food}%"></div></div></div>
                            <div class="stat-row"><span class="stat-icon">💧</span><div class="bar-container"><div class="bar-fill water-fill" style="width:${this.stats.water}%"></div></div></div>
                            <div class="stat-row"><span class="stat-icon">🌙</span><div class="bar-container"><div class="bar-fill sleep-fill" style="width:${this.stats.sleep}%"></div></div></div>
                            <div class="stat-row"><span class="stat-icon">⚡</span><div class="bar-container"><div class="bar-fill stam-fill" style="width:${this.stats.stam}%"></div></div></div>
                        </div>
                    `;
                } else { this.labelElement.style.display = 'none'; }
            }
        }

        entities.bots.push(new SmartBot("b1", "Alpha", 0xff0055));
        entities.bots.push(new SmartBot("b2", "Beta", 0x0088ff)); 
        entities.bots.push(new SmartBot("b3", "Gamma", 0x22aa22));

        // ==========================================
        // 4. CAMERA & VÒNG LẶP RENDER
        // ==========================================
        window.setCamera = function(id) {
            targetBotId = id; document.querySelectorAll('.cam-btn').forEach(btn => btn.classList.remove('active')); event.target.classList.add('active');
            const invPanel = document.getElementById('inventory-panel');
            if (id !== 'free') { invPanel.style.display = 'block'; } else { invPanel.style.display = 'none'; }
        };

        function updateEnvironment() {
            globalTime += 0.0005; 
            if (globalTime >= 24) { globalTime = 0; daysPassed++; }
            let sunAngle = (globalTime / 24) * Math.PI * 2 - Math.PI/2;
            sunLight.position.x = Math.cos(sunAngle) * 5000; sunLight.position.y = Math.sin(sunAngle) * 5000;
            
            if (globalTime > 6 && globalTime < 18) { scene.background = new THREE.Color(0x87CEEB); ambientLight.intensity = 0.5; sunLight.intensity = 1.0; scene.fog.color.setHex(0x87CEEB); }
            else if (globalTime >= 18 && globalTime <= 19) { scene.background = new THREE.Color(0xfdb813); ambientLight.intensity = 0.3; sunLight.intensity = 0.5; scene.fog.color.setHex(0xfdb813); }
            else { scene.background = new THREE.Color(0x0a1a2a); ambientLight.intensity = 0.1; sunLight.intensity = 0.0; scene.fog.color.setHex(0x0a1a2a); }

            if (Math.random() < 0.05 && entities.trees.filter(t => t.active).length < 400) { spawnTree(); }
            
            if (daysPassed % 3 === 0 && !window.rockSpawnedThisCycle) {
                window.rockSpawnedThisCycle = true;
                let activeRocks = entities.rocks.filter(r => r.active).length;
                let activeOres = entities.ores.filter(o => o.active).length;
                for(let i=0; i<150-activeRocks; i++) spawnRock();
                for(let i=0; i<80-activeOres; i++) spawnOre();
            }
            if (daysPassed % 3 !== 0) window.rockSpawnedThisCycle = false;

            if (Math.random() < 0.05) {
                entities.trees = entities.trees.filter(t => t.active);
                entities.rocks = entities.rocks.filter(r => r.active);
                entities.ores = entities.ores.filter(o => o.active);
                entities.animals = entities.animals.filter(a => a.active);
                entities.items = entities.items.filter(i => i.active);
                entities.buildings = entities.buildings.filter(b => b.active);
            }

            if(entities.buildings) {
                entities.buildings.forEach(b => {
                    if (b.active && b.hp > 0) {
                        if (b.door) {
                            let isNear = entities.bots.some(bot => bot.stats.hp > 0 && bot.group.position.distanceTo(b.position) < 150);
                            let targetRot = isNear ? Math.PI/2 : 0;
                            b.door.rotation.y += (targetRot - b.door.rotation.y) * 0.1; 
                        }

                        const vector = new THREE.Vector3(); b.getWorldPosition(vector);
                        let scaleMod = b.level ? b.scale.y : 1;
                        vector.y += 120 * scaleMod; vector.project(camera);
                        const x = (vector.x * .5 + .5) * window.innerWidth; const y = (vector.y * -.5 + .5) * window.innerHeight;
                        if (vector.z < 1 && !isNaN(x) && !isNaN(y)) {
                            b.label.style.display = 'block'; b.label.style.left = `${x}px`; b.label.style.top = `${y}px`;
                            b.label.innerHTML = `Nhà Lv.${b.level || 1} <br><div style="width:100%;height:3px;background:red;"><div style="width:${(b.hp/b.maxHp)*100}%;height:100%;background:#00ff00;"></div></div>`;
                        } else { b.label.style.display = 'none'; }
                    }
                });
            }

            currentSeason = Math.floor((daysPassed - 1) / 5) % 4;
            document.getElementById('time-display').innerText = `Ngày ${daysPassed} - ${Math.floor(globalTime).toString().padStart(2, '0')}:${Math.floor((globalTime%1)*60).toString().padStart(2, '0')} (Mùa ${SEASONS[currentSeason]})`;
            
            if (targetBotId !== 'free') {
                let bot = entities.bots.find(b => b.id === targetBotId);
                if (bot) {
                    document.getElementById('inv-bot-name').innerText = `🎒 TÚI ĐỒ: ${bot.name}`;
                    document.getElementById('inv-weapon-slot').innerHTML = `⚔️ Vũ khí: ${bot.weaponName} (${bot.damage} Dmg)`;
                    document.getElementById('inv-armor-slot').innerHTML = `🛡️ Giáp: ${bot.armorName}`;
                    document.getElementById('inv-wood').innerText = bot.inv.wood;
                    document.getElementById('inv-stone').innerText = bot.inv.stone;
                    document.getElementById('inv-ore').innerText = bot.inv.ore;
                    document.getElementById('inv-meat').innerText = bot.inv.meat;
                    document.getElementById('inv-food').innerText = bot.inv.food;
                    document.getElementById('inv-fur').innerText = bot.inv.fur;
                }
            }
        }

        function animate() {
            requestAnimationFrame(animate); updateEnvironment();
            entities.animals.forEach(a => a.update());
            entities.bots.forEach(bot => bot.update());
            
            for (let i = projectiles.length - 1; i >= 0; i--) {
                let p = projectiles[i];
                if (!p.target || !p.target.active || p.target.hp <= 0) { 
                    removeFromScene(p); projectiles.splice(i, 1); continue; 
                }
                
                let targetPos = p.target.group ? p.target.group.position : (p.target.mesh ? p.target.mesh.position : p.target.position);
                let dir = new THREE.Vector3().subVectors(targetPos, p.mesh.position);
                let d = dir.length();
                
                if (d < p.speed) {
                    let targetAliveBefore = p.target.hp > 0;
                    
                    let isResource = ['wood', 'stone', 'ore', 'berry'].includes(p.target.type);
                    if (isResource) p.dmg = 5;

                    if (p.target.takeDamage) p.target.takeDamage(p.dmg, p.shooter); 
                    else p.target.hp -= p.dmg;
                    
                    if (isResource && p.target.hp > 0) {
                        let ratio = p.target.hp / p.target.maxHp;
                        if (p.target.type === 'wood') {
                            p.target.scale.y = Math.max(0.1, ratio); 
                            if (ratio <= 0.5 && p.target.children[1]) p.target.children[1].visible = false; 
                        } else if (p.target.type === 'berry') {
                            if (p.target.children[0]) p.target.children[0].scale.set(Math.max(0.1, ratio), Math.max(0.1, ratio), Math.max(0.1, ratio));
                        } else if (p.target.type === 'stone' || p.target.type === 'ore') {
                            let scale = Math.max(0.2, ratio);
                            p.target.scale.set(scale, scale, scale);
                        }
                    }

                    if(targetAliveBefore && p.target.hp <= 0) {
                        p.target.active = false; 
                        
                        if(p.target.species) {
                            let l = p.target.level || 1; 
                            if(typeof p.target.die === 'function') p.target.die(); 
                            p.shooter.gainXp(10 * l); 
                        }
                        else if(p.target.id) {
                            if(typeof p.target.die === 'function') p.target.die();
                            p.shooter.gainXp(50);
                        }
                        else if(p.target.type === 'wood') { p.shooter.inv.wood += 10; dropResources(p.target.position.x, p.target.position.z, 'wood', 2); p.shooter.gainXp(2); }
                        else if(p.target.type === 'stone') { p.shooter.inv.stone += 10; dropResources(p.target.position.x, p.target.position.z, 'stone', 2); p.shooter.gainXp(2); }
                        else if(p.target.type === 'ore') { p.shooter.inv.ore += 5; dropResources(p.target.position.x, p.target.position.z, 'ore', 2); p.shooter.gainXp(5); }
                        else if(p.target.type === 'berry') { p.shooter.inv.food += 4; }
                        removeFromScene(p.target); 
                    }
                    removeFromScene(p); projectiles.splice(i, 1);
                } else {
                    dir.normalize(); p.mesh.position.add(dir.multiplyScalar(p.speed));
                }
            }

            if (targetBotId === 'free') {
                const moveSpeed = 30;
                const forward = new THREE.Vector3(); camera.getWorldDirection(forward); 
                
                forward.y = 0; 
                if (forward.lengthSq() < 0.001) { forward.set(0, 0, -1).applyQuaternion(camera.quaternion); forward.y = 0; }
                forward.normalize();
                
                const right = new THREE.Vector3(); right.crossVectors(forward, camera.up).normalize();

                if (keys.KeyW) { controls.target.addScaledVector(forward, moveSpeed); camera.position.addScaledVector(forward, moveSpeed); }
                if (keys.KeyS) { controls.target.addScaledVector(forward, -moveSpeed); camera.position.addScaledVector(forward, -moveSpeed); }
                if (keys.KeyA) { controls.target.addScaledVector(right, -moveSpeed); camera.position.addScaledVector(right, -moveSpeed); }
                if (keys.KeyD) { controls.target.addScaledVector(right, moveSpeed); camera.position.addScaledVector(right, moveSpeed); }
            } else {
                let bot = entities.bots.find(b => b.id === targetBotId);
                if (bot && bot.stats.hp > 0 && !isNaN(bot.group.position.x)) {
                    let idealOffset = new THREE.Vector3(0, 150, -300); 
                    idealOffset.applyQuaternion(bot.group.quaternion);
                    idealOffset.add(bot.group.position);
                    camera.position.lerp(idealOffset, 0.08); 
                    
                    let idealLookAt = new THREE.Vector3(0, 50, 200); 
                    idealLookAt.applyQuaternion(bot.group.quaternion);
                    idealLookAt.add(bot.group.position);
                    controls.target.lerp(idealLookAt, 0.08);
                }
            }
            controls.update(); renderer.render(scene, camera);
        }
        window.addEventListener('resize', () => { camera.aspect = window.innerWidth/window.innerHeight; camera.updateProjectionMatrix(); renderer.setSize(window.innerWidth, window.innerHeight); });
        animate();
    </script>
</body>
